[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.tokenizer", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.gd", "php82Extensions.zip", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan config:clear; php artisan cache:clear; php artisan migrate --force; php artisan storage:link --quiet || true; mkdir -p public/uploads/foto_menu public/uploads/bukti_terima public/uploads/ompreng; php -d upload_max_filesize=40M -d post_max_size=40M -d memory_limit=256M artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
