<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Definitions for gradients and drop shadows -->
    <defs>
        <!-- Background Gradient: Emerald to Teal for health and fresh nutrition -->
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#10B981"/> <!-- Emerald 500 -->
            <stop offset="100%" stop-color="#0F766E"/> <!-- Teal 700 -->
        </linearGradient>
        
        <!-- Golden leaf gradient for nutritious energy -->
        <linearGradient id="goldGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FBBF24"/> <!-- Amber 400 -->
            <stop offset="100%" stop-color="#D97706"/> <!-- Amber 600 -->
        </linearGradient>

        <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>

    <!-- Outer Rounded Hexagon / Rounded Rect Base -->
    <rect width="90" height="90" x="5" y="5" rx="24" fill="url(#bgGradient)" filter="url(#dropShadow)" />

    <!-- Stylized Plate Ring -->
    <circle cx="50" cy="50" r="24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
    <circle cx="50" cy="50" r="18" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="3 3" opacity="0.5" />

    <!-- Spoon (Right Side) -->
    <!-- Head of the spoon -->
    <path d="M 57 42 C 55 40 52 41 51 43 C 50 45 51 48 53 50 L 58 55 L 58 64 C 58 65.1 58.9 66 60 66 C 61.1 66 62 65.1 62 64 L 62 55 L 63 54 C 65 52 66 49 65 47 C 64 44 60 42 57 42 Z" fill="#FFFFFF" />
    
    <!-- Fork (Left Side) -->
    <!-- Handle -->
    <rect x="38" y="54" width="3" height="12" rx="1.5" fill="#FFFFFF" />
    <!-- Fork Base and Tines -->
    <path d="M 36 42 L 36 48 C 36 51 38 53 41 53 L 41 55 L 43 55 L 43 53 C 46 53 48 51 48 48 L 48 42" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Tines details -->
    <line x1="40" y1="42" x2="40" y2="48" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
    <line x1="44" y1="42" x2="44" y2="48" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />

    <!-- Healthy Golden Leaf (Top Center/Right) -->
    <path d="M 50 28 C 44 32 46 40 52 38 C 58 36 56 28 50 28 Z" fill="url(#goldGradient)" filter="url(#dropShadow)" />
    <!-- Leaf stem -->
    <path d="M 50 38 Q 48 44 50 46" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
</svg>
